<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify · Inventory</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Inter", system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1e293b; line-height: 1.5; height: 100vh; width: 100vw; overflow: hidden; }
    .shell { display: flex; width: 100%; height: 100vh; overflow: hidden; background: #fff; }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; gap: 12px; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-size: 1rem; font-weight: 700; color: #0f172a; letter-spacing: -.01em; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    #searchInput { padding: 7px 12px; border: 1px solid #d1d9e6; font-size: .85rem; width: 260px; border-radius: 4px; background: white; font-family: inherit; }
    #searchInput:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,.08); }
    .content { flex: 1; min-height: 0; overflow: hidden; position: relative; }
    .view-panel { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .table-scroll { flex: 1; min-height: 0; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th { text-align: left; padding: 11px 14px; background: #f8fafc; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; z-index: 10; font-size: .78rem; text-transform: uppercase; letter-spacing: .3px; }
    td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; background: white; transition: background .3s; }
    tr:hover td { background: #fafafa; }
    tr:last-child td { border-bottom: none; }
    .product-image { width: 40px; height: 40px; object-fit: cover; border: 1px solid #e2e8f0; border-radius: 4px; display: block; }
    .no-image { width: 40px; height: 40px; background: #f1f5f9; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: .65rem; border: 1px dashed #cbd5e1; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: .7rem; font-weight: 600; font-family: 'Menlo', 'Consolas', monospace; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .empty-row { text-align: center; padding: 40px !important; color: #64748b; font-size: .9rem; font-style: italic; }
    .inv-input-group { display: flex; align-items: center; gap: 6px; }
    .inv-input { width: 70px; padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: .85rem; text-align: right; }
    .inv-save-btn { background: #0f172a; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: .75rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .inv-save-btn:hover { background: #1e293b; }
    .inv-save-btn:disabled { opacity: .5; cursor: not-allowed; }
    .untracked { color: #94a3b8; font-size: .8rem; font-style: italic; }
    body.dark-theme { background: #0b1120; color: #f8fafc; }
    body.dark-theme .shell { background: #0f172a; }
    body.dark-theme .topbar { background: #0f172a; border-color: #1e293b; }
    body.dark-theme .topbar-title { color: #f8fafc; }
    body.dark-theme #searchInput { background: #1e293b; border-color: #334155; color: #f8fafc; }
    body.dark-theme th { background: #1e293b; color: #94a3b8; border-color: #334155; }
    body.dark-theme td { background: #0f172a; border-color: #1e293b; color: #e2e8f0; }
    body.dark-theme tr:hover td { background: #1e293b; }
    body.dark-theme .no-image { background: #1e293b; border-color: #334155; color: #64748b; }
    body.dark-theme .badge { background: #1e293b; color: #94a3b8; border-color: #334155; }
    body.dark-theme .empty-row { color: #64748b; }
    body.dark-theme .inv-input { background: #1e293b; border-color: #334155; color: white; }
    body.dark-theme .inv-save-btn { background: #f8fafc; color: #0f172a; }
    body.dark-theme .inv-save-btn:hover { background: #e2e8f0; }
  </style>
</head>
<body>
<script>if(localStorage.getItem("theme")==="dark")document.body.classList.add("dark-theme");</script>
{% include 'components/global_nav.html' %}
{% include 'components/custom_alert.html' %}

<div class="shell" id="shell">
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Inventory</div>
      </div>
      <div class="topbar-right">
        <input type="text" id="searchInput" placeholder="Search by product title or SKU..." oninput="filterInventory()" />
        <button onclick="loadInventory()" style="padding:7px 14px; border:1px solid #d1d9e6; border-radius:4px; background:white; font-size:.85rem; cursor:pointer;">↻ Refresh</button>
      </div>
    </div>

    <div class="content">
      <div class="view-panel">
        <div class="table-scroll">
          <table id="inventoryTable">
            <thead>
              <tr>
                <th style="width: 50px;">Image</th>
                <th style="min-width: 200px;">Product</th>
                <th>Variant / SKU</th>
                <th>Location</th>
                <th>Available</th>
                <th style="width: 150px; text-align: right;">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="6" class="empty-row">⏳ Loading inventory data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let allInventory = [];
  let filteredInventory = [];
  let searchDebounce = null;

  async function loadInventory() {
    const tbody = document.querySelector('#inventoryTable tbody');
    tbody.innerHTML = `<tr><td colspan="6" class="empty-row">⏳ Loading...</td></tr>`;
    try {
      const res = await fetch('/api/inventory/list');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      allInventory = await res.json();
      filteredInventory = [...allInventory];
      renderTable();
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-row" style="color:#b91c1c;">Error loading inventory: ${escapeHtml(err.message)}</td></tr>`;
    }
  }

  function filterInventory() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      const term = document.getElementById('searchInput').value.trim().toLowerCase();
      filteredInventory = allInventory.filter(item => {
        const titleMatch = item.product_title.toLowerCase().includes(term) || item.variant_title.toLowerCase().includes(term);
        const skuMatch = item.sku && item.sku.toLowerCase().includes(term);
        return term === '' || titleMatch || skuMatch;
      });
      renderTable();
    }, 250);
  }

  function renderTable() {
    const tbody = document.querySelector('#inventoryTable tbody');
    tbody.innerHTML = '';

    if (filteredInventory.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-row">No inventory items found.</td></tr>`;
      return;
    }

    filteredInventory.forEach(item => {
      const img = item.image
        ? `<img src="${escapeHtml(item.image)}" class="product-image" alt="img" />`
        : `<div class="no-image">No img</div>`;

      if (!item.levels || item.levels.length === 0) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${img}</td>
          <td><div style="font-weight:600; font-size:.9rem;">${escapeHtml(item.product_title)}</div></td>
          <td>
            <div style="font-size:.85rem; margin-bottom:4px;">${escapeHtml(item.variant_title)}</div>
            ${item.sku ? `<span class="badge">${escapeHtml(item.sku)}</span>` : ''}
          </td>
          <td colspan="3"><span class="untracked">Not tracked or no locations</span></td>
        `;
        tbody.appendChild(row);
        return;
      }

      item.levels.forEach((level, idx) => {
        const isFirst = (idx === 0);
        const imgCell   = isFirst ? `<td>${img}</td>` : `<td></td>`;
        const prodCell  = isFirst ? `<td><div style="font-weight:600; font-size:.9rem;">${escapeHtml(item.product_title)}</div></td>` : `<td></td>`;
        const varCell   = isFirst ? `<td><div style="font-size:.85rem; margin-bottom:4px;">${escapeHtml(item.variant_title)}</div>${item.sku ? `<span class="badge">${escapeHtml(item.sku)}</span>` : ''}</td>` : `<td></td>`;
        const available = level.available !== null && level.available !== undefined ? level.available : 0;
        const levelIdSafe = level.id.replace(/[^a-zA-Z0-9]/g, '_');

        const tr = document.createElement('tr');
        tr.innerHTML = `
          ${imgCell}
          ${prodCell}
          ${varCell}
          <td style="font-size:.85rem; color:#475569;">${escapeHtml(level.location_name || level.location_id)}</td>
          <td>
            <div class="inv-input-group">
              <input type="number" class="inv-input" id="inv_${levelIdSafe}" value="${available}" data-original="${available}" />
            </div>
          </td>
          <td style="text-align: right;">
            <button class="inv-save-btn"
              data-inv-item="${escapeHtml(item.inventory_item_id)}"
              data-location="${escapeHtml(level.location_id)}"
              data-level-id="${levelIdSafe}"
              onclick="saveInventory(this)">
              Update
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });
  }

  async function saveInventory(btn) {
    const invItemId  = btn.dataset.invItem;
    const locationId = btn.dataset.location;
    const levelIdSafe = btn.dataset.levelId;
    const inputEl    = document.getElementById('inv_' + levelIdSafe);
    const newVal     = parseInt(inputEl.value, 10);
    const oldVal     = parseInt(inputEl.dataset.original, 10);

    if (isNaN(newVal) || newVal === oldVal) return;

    const delta = newVal - oldVal;
    const originalText = btn.textContent;
    btn.textContent = '...';
    btn.disabled = true;
    inputEl.disabled = true;

    try {
      const res = await fetch('/api/inventory/adjust', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          inventoryItemId: invItemId,
          locationId: locationId,
          availableDelta: delta,
          currentQuantity: oldVal
        })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || 'Failed');
      }
      const data = await res.json();
      inputEl.value = data.available;
      inputEl.dataset.original = data.available;

      // Visual feedback
      const td = inputEl.closest('td');
      td.style.background = '#dcfce7';
      setTimeout(() => td.style.background = '', 1000);

    } catch (e) {
      await showCustomAlert({ title: 'Inventory Update Failed', message: e.message, type: 'danger' });
      inputEl.value = oldVal;
    } finally {
      btn.textContent = originalText;
      btn.disabled = false;
      inputEl.disabled = false;
    }
  }

  document.addEventListener('DOMContentLoaded', loadInventory);
</script>
</body>
</html>
